name: keepalive

# Keep the live deploy warm for judges who click days later, and fail loudly if it is down.
# Set the repo variables ROOTED_API_URL (and optionally ROOTED_SITE_URL) after deploying; until
# then this job no-ops.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health and the site
        env:
          API_URL: ${{ vars.ROOTED_API_URL }}
          SITE_URL: ${{ vars.ROOTED_SITE_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "ROOTED_API_URL not set; nothing to ping yet."
            exit 0
          fi
          echo "Pinging $API_URL/health"
          curl -fsS "$API_URL/health" > /dev/null && echo "api ok"
          if [ -n "$SITE_URL" ]; then
            echo "Pinging $SITE_URL"
            curl -fsS -o /dev/null "$SITE_URL" && echo "site ok"
          fi
