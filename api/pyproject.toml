[project]
name = "rooted-api"
version = "0.1.0"
description = "Rooted SBR API (C2PA v2.4 Soft Binding Resolution)"
requires-python = ">=3.11,<3.14"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rooted_api"]
