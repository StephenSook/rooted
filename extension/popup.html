<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        width: 280px;
        background: #0b1020;
        color: #e6e8ee;
        font: 13px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
      }
      .wrap {
        padding: 16px 18px;
      }
      .brand {
        font-family: ui-monospace, monospace;
        font-size: 11px;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: #8a90a2;
      }
      h1 {
        font-size: 16px;
        margin: 4px 0 8px;
      }
      p {
        color: #aab0c0;
        margin: 0 0 12px;
      }
      b {
        color: #e6e8ee;
      }
      .status {
        font-family: ui-monospace, monospace;
        font-size: 12px;
        color: #8a90a2;
      }
      a {
        display: inline-block;
        margin-top: 12px;
        color: #60a5fa;
        text-decoration: none;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="brand">Rooted</div>
      <h1>C2PA provenance recovery</h1>
      <p>
        Right-click any image and choose <b>Recover provenance with Rooted</b> to look up its origin
        through the Soft Binding Resolution API.
      </p>
      <div id="status" class="status">checking API...</div>
      <a href="https://rooted-web-phi.vercel.app" target="_blank" rel="noopener">Open Rooted &rarr;</a>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
