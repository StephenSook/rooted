# XcodeGen spec for the Rooted iOS app.
#
# The .xcodeproj is a build artifact and is never committed. Generate it with:
#   brew install xcodegen
#   xcodegen generate
# then open Rooted.xcodeproj in Xcode.
#
# Two targets ship: the Rooted app and the RootedShare share extension
# (Phase M2), which lets any app's share sheet send an image straight to
# Rooted for provenance recovery.

name: Rooted

options:
  bundleIdPrefix: io.rooted
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    # Swift 5 language mode on purpose: the app uses async/await and MainActor
    # view models, but stays out of Swift 6 strict-concurrency enforcement so the
    # first CI run is not blocked on Sendable diagnostics.
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Automatic

targets:
  Rooted:
    type: application
    platform: iOS
    sources:
      - Rooted
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rooted.verify
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      # Builds the share extension and copies it into the app's PlugIns
      # folder, so building the Rooted scheme builds everything CI needs.
      - target: RootedShare
        embed: true
    info:
      # XcodeGen writes this file at generate time; it stays untracked.
      path: Rooted/Info.plist
      properties:
        CFBundleDisplayName: Rooted
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Rooted photographs an image to recover its provenance."
        NSPhotoLibraryUsageDescription: "Rooted reads the photo you choose so it can recover that image's provenance."
        ITSAppUsesNonExemptEncryption: false

  RootedShare:
    type: app-extension
    platform: iOS
    sources:
      - RootedShare
      # Shared with the app target so the extension uploads, decodes, and
      # verifies through exactly the same code. No duplicated files. All of
      # these are extension-safe: no PhotosUI, no UIApplication.shared.
      - path: Rooted/Api/RootedClient.swift
      - path: Rooted/Features/Verify/ImageProcessor.swift
      - path: Rooted/Features/Verify/VerifyViewModel.swift
      - path: Rooted/Features/Share/SharePayload.swift
      - path: Rooted/Theme.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.rooted.verify.share
        TARGETED_DEVICE_FAMILY: "1"
        APPLICATION_EXTENSION_API_ONLY: true
    info:
      # XcodeGen writes this file at generate time; it stays untracked.
      path: RootedShare/Info.plist
      properties:
        CFBundleDisplayName: Verify with Rooted
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionAttributes:
            # The simple dictionary activation rule: exactly one image.
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"

  RootedTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RootedTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Rooted

schemes:
  Rooted:
    build:
      targets:
        Rooted: all
    test:
      gatherCoverageData: false
      targets:
        - RootedTests
