[project]
name = "rooted-storage"
version = "0.1.0"
description = "Backblaze B2 storage for Rooted: content-addressable layout + Object Lock"
requires-python = ">=3.11,<3.14"
dependencies = [
    "b2sdk>=2.0",
    "pydantic>=2.7",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["rooted_storage"]
